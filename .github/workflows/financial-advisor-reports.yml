name: Financial Advisor Reports

on:
  schedule:
    # BRT is UTC-3: 11:15 BRT on weekdays.
    - cron: "15 14 * * 1-5"
    # BRT is UTC-3: 17:15 BRT on weekdays.
    - cron: "15 20 * * 1-5"
  workflow_dispatch:
    inputs:
      report_type:
        description: "Report type to generate"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - close

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      COINBASE_API_KEY: ${{ secrets.COINBASE_API_KEY }}
      ADVISOR_ACCOUNT_CAPITAL: ${{ secrets.ADVISOR_ACCOUNT_CAPITAL }}
      ADVISOR_RISK_FRACTION: ${{ secrets.ADVISOR_RISK_FRACTION }}
      ADVISOR_MAX_DAILY_LOSS_FRACTION: ${{ secrets.ADVISOR_MAX_DAILY_LOSS_FRACTION }}
      ADVISOR_MAX_WEEKLY_LOSS_FRACTION: ${{ secrets.ADVISOR_MAX_WEEKLY_LOSS_FRACTION }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Select report type
        shell: bash
        run: |
          REPORT_TYPE="${{ github.event.inputs.report_type }}"
          if [ -z "$REPORT_TYPE" ]; then
            if [ "${{ github.event.schedule }}" = "15 20 * * 1-5" ]; then
              REPORT_TYPE=close
            else
              REPORT_TYPE=main
            fi
          fi
          echo "REPORT_TYPE=$REPORT_TYPE" >> "$GITHUB_ENV"

      - name: Validate live config
        continue-on-error: true
        run: python -m advisor config validate --require-live

      - name: Generate report
        shell: bash
        run: |
          if [ "$REPORT_TYPE" = "main" ]; then
            python -m advisor report main --include-discovery --require-live --output-dir reports
          else
            python -m advisor report close --include-discovery --require-live --output-dir reports
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: financial-advisor-${{ env.REPORT_TYPE }}-${{ github.run_id }}
          path: reports/
          if-no-files-found: error
